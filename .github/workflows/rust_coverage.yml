name: Rust coverage

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: Report Rust coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./src-tauri

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install minimal stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          workspaces: "./src-tauri -> target"
          key: coverage-ubuntu

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev patchelf

      - name: Collect coverage (non-blocking)
        id: coverage
        shell: bash
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
        run: |
          mkdir -p target/llvm-cov
          set +e
          cargo llvm-cov --workspace --lcov --output-path target/llvm-cov/lcov.info \
            > target/llvm-cov/summary.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rust-coverage
          path: |
            src-tauri/target/llvm-cov/lcov.info
            src-tauri/target/llvm-cov/summary.txt
          if-no-files-found: warn

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src-tauri/target/llvm-cov/lcov.info
          fail_ci_if_error: false
